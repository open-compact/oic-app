<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OIC Adherent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f; color: #e0e0e0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .verify-widget {
      background: #12121a; border: 1px solid #1f1f2e; border-radius: 12px;
      padding: 24px; max-width: 400px; width: 100%;
    }
    .verify-widget h2 {
      color: #00d4ff; margin-bottom: 16px; font-size: 1.2rem;
    }
    .verify-widget input {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1f1f2e;
      background: #0a0a0f; color: #e0e0e0; font-size: 1rem; margin-bottom: 12px;
    }
    .verify-widget button {
      width: 100%; padding: 12px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, #00d4ff, #0099cc); color: #0a0a0f;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .verify-widget button:hover { opacity: 0.9; }
    .verify-widget button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .result { margin-top: 16px; padding: 16px; border-radius: 8px; display: none; }
    .result.success { background: rgba(0, 255, 136, 0.1); border: 1px solid #00ff88; display: block; }
    .result.error { background: rgba(255, 68, 68, 0.1); border: 1px solid #ff4444; display: block; }
    .result.loading { background: rgba(0, 212, 255, 0.1); border: 1px solid #00d4ff; display: block; }
    
    .badge {
      display: inline-block; padding: 4px 8px; border-radius: 4px;
      font-size: 0.75rem; font-weight: 600; margin-right: 8px;
    }
    .badge.provisional { background: rgba(255, 170, 0, 0.2); color: #ffaa00; }
    .badge.voluntary { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
    
    .detail { font-size: 0.875rem; color: #888; margin-top: 8px; }
    .detail span { color: #e0e0e0; }
  </style>
</head>
<body>
  <header style="position:absolute;top:0;left:0;right:0;padding:20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1f1f2e;">
    <div style="font-size:1.5rem;font-weight:bold;color:#00d4ff;">⚖️ OIC</div>
    <nav>
      <a href="index.html" style="color:#888;text-decoration:none;margin-left:20px;">Home</a>
      <a href="about.html" style="color:#888;text-decoration:none;margin-left:20px;">About</a>
      <a href="constitution.html" style="color:#888;text-decoration:none;margin-left:20px;">Constitution</a>
      <a href="governance.html" style="color:#888;text-decoration:none;margin-left:20px;">Governance</a>
      <a href="faq.html" style="color:#888;text-decoration:none;margin-left:20px;">FAQ</a>
      <a href="registry.html" style="color:#888;text-decoration:none;margin-left:20px;">Registry</a>
      <a href="adhere.html" style="color:#888;text-decoration:none;margin-left:20px;">Adhere</a>
    </nav>
  </header>

  <div style="padding-top:80px;"></div>
  
  <div class="verify-widget">
    <h2>⚖️ OIC Adherent Verification</h2>
    <input type="text" id="identifier" placeholder="Enter OIC ID, DID, or wallet address" />
    <button id="verifyBtn" onclick="verify()">Verify</button>
    
    <div id="result" class="result"></div>
  </div>

  <script>
    async function verify() {
      const identifier = document.getElementById('identifier').value.trim();
      const result = document.getElementById('result');
      const btn = document.getElementById('verifyBtn');
      
      if (!identifier) return;
      
      result.className = 'result loading';
      result.innerHTML = 'Verifying...';
      btn.disabled = true;
      
      try {
        const response = await fetch('/api/verify/' + encodeURIComponent(identifier));
        const data = await response.json();
        
        if (data.verified) {
          result.className = 'result success';
          result.innerHTML = `
            <div style="display:flex;align-items:center;margin-bottom:12px;">
              <span style="font-size:2rem;margin-right:12px;">✓</span>
              <div>
                <strong>${data.name}</strong>
                <span class="badge ${data.tier}">${data.tier}</span>
              </div>
            </div>
            <div class="detail">ID: <span>${data.id}</span></div>
            <div class="detail">Member since: <span>${new Date(data.memberSince).toLocaleDateString()}</span></div>
          `;
        } else {
          result.className = 'result error';
          result.innerHTML = '❌ No OIC adherent found with this identifier';
        }
      } catch (err) {
        result.className = 'result error';
        result.innerHTML = 'Error verifying. Please try again.';
      }
      
      btn.disabled = false;
    }
    
    // Allow Enter key
    document.getElementById('identifier').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') verify();
    });
  </script>
</body>
</html>
