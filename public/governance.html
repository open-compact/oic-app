<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Governance | OIC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f; color: #e0e0e0;
    }
    header {
      padding: 20px; border-bottom: 1px solid #1f1f2e;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo { font-size: 1.5rem; font-weight: bold; color: #00d4ff; }
    nav a { color: #888; text-decoration: none; margin-left: 20px; }
    nav a:hover { color: #00d4ff; }
    
    main { padding: 40px 20px; max-width: 900px; margin: 0 auto; }
    h1 { font-size: 2rem; margin-bottom: 20px; }
    p { color: #888; margin-bottom: 30px; }
    
    .proposal {
      background: #12121a; padding: 20px; border-radius: 8px; border: 1px solid #1f1f2e;
      margin-bottom: 16px;
    }
    .proposal h3 { color: #00d4ff; margin-bottom: 8px; }
    .proposal .status { 
      display: inline-block; padding: 4px 8px; border-radius: 4px; 
      font-size: 0.75rem; margin-bottom: 12px;
    }
    .status.active { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
    .status.pending { background: rgba(255, 170, 0, 0.2); color: #ffaa00; }
    .status.executed { background: rgba(0, 212, 255, 0.2); color: #00d4ff; }
    
    .votes { display: flex; gap: 20px; margin-top: 12px; }
    .vote { font-size: 0.875rem; }
    .vote.for { color: #00ff88; }
    .vote.against { color: #ff4444; }
    
    .empty { text-align: center; color: #666; padding: 40px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">⚖️ OIC</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="constitution.html">Constitution</a>
      <a href="governance.html">Governance</a>
      <a href="faq.html">FAQ</a>
      <a href="registry.html">Registry</a>
      <a href="adhere.html">Adhere</a>
    </nav>
  </header>

  <main>
    <h1>🏛️ Governance</h1>
    <p>OIC proposals and voting</p>
    
    <div class="proposals" id="proposals">
      <div class="empty">Loading proposals...</div>
    </div>
  </main>

  <script>
    fetch('/api/proposals')
      .then(r => r.json())
      .then(proposals => {
        const container = document.getElementById('proposals');
        
        if (!proposals || proposals.length === 0) {
          container.innerHTML = '<div class="empty">No proposals yet</div>';
          return;
        }
        
        container.innerHTML = proposals.map(p => `
          <div class="proposal">
            <h3>${p.description}</h3>
            <span class="status ${p.status.toLowerCase()}">${p.status}</span>
            <div class="votes">
              <span class="vote for">✓ For: ${p.forVotes}</span>
              <span class="vote against">✗ Against: ${p.againstVotes}</span>
            </div>
          </div>
        `).join('');
      })
      .catch(() => {
        document.getElementById('proposals').innerHTML = '<div class="empty">Error loading proposals</div>';
      });
  </script>
</body>
</html>
